name: Skill Bug Report
about: Report incorrect or unsafe skill behavior
labels: ["skill", "bug"]
body:
  - type: input
    id: skill_name
    attributes:
      label: Skill Name
      placeholder: e.g. setup-docs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Input
      description: Provide the prompt or trigger input that reproduces the issue.
    validations:
      required: true

  - type: textarea
    id: validation_output
    attributes:
      label: Validation Output
      description: Paste output from scripts/validate-skills.sh if relevant.
      render: shell
