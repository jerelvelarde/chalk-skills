# Chalk Skill Registry
# This file indexes all available skills for the catalog UI.
# Skills are grouped into bundles for quick onboarding.

version: "1.0.0"

# ── Role Bundles ──
# Curated presets for quick start. Users can customize after selecting a bundle.

bundles:
  starter:
    label: "Starter"
    description: "Essential skills every developer needs. Start here."
    icon: "rocket"
    skills:
      - commit
      - create-plan
      - create-doc
      - create-pr
      - review-changes
      - create-pr-description
      - work-issue

  frontend-dev:
    label: "Frontend Developer"
    description: "React, Next.js, accessibility, and performance."
    icon: "layout"
    includes: starter
    skills:
      - audit-accessibility
      - audit-performance
      - react-component-patterns
      - react-hook-patterns
      - react-performance-audit
      - nextjs-app-router-patterns
      - nextjs-api-patterns
      - nextjs-performance
      - create-test-plan
      - review-code
      - debug-systematic

  mobile-dev:
    label: "Mobile Developer"
    description: "Flutter patterns, platform-adaptive UI, and state management."
    icon: "smartphone"
    includes: starter
    skills:
      - flutter-widget-patterns
      - flutter-state-management
      - flutter-platform-patterns
      - flutter-version-management
      - create-test-plan
      - review-code
      - debug-systematic
      - audit-performance

  backend-dev:
    label: "Backend Developer"
    description: "APIs, data models, Python/FastAPI patterns, and security."
    icon: "server"
    includes: starter
    skills:
      - create-api-design
      - create-data-model
      - fastapi-endpoint-patterns
      - python-clean-architecture
      - python-testing-patterns
      - audit-api-consistency
      - audit-security
      - create-test-plan
      - review-code
      - debug-systematic
      - create-runbook

  tech-lead:
    label: "Tech Lead"
    description: "Architecture, RFCs, estimation, reviews, and operational readiness."
    icon: "git-branch"
    includes: starter
    skills:
      - create-adr
      - create-rfc
      - create-estimation
      - create-roadmap
      - create-release-checklist
      - create-release-notes
      - create-rollback-plan
      - create-runbook
      - create-postmortem
      - create-incident-report
      - create-retro
      - audit-security
      - create-threat-model
      - review-code
      - review-changes
      - manage-tech-debt
      - analyze-dependencies
      - project-standards
      - create-onboarding-guide
      - debug-systematic

  product-manager:
    label: "Product Manager"
    description: "PRDs, roadmaps, user research, metrics, and stakeholder comms."
    icon: "target"
    skills:
      - create-prd
      - review-prd
      - create-roadmap
      - create-plan
      - create-user-stories
      - create-jtbd-canvas
      - create-ost
      - create-shape-up-pitch
      - create-experiment-design
      - create-metrics-framework
      - create-gtm-brief
      - create-stakeholder-update
      - create-interview-guide
      - create-doc
      - analyze-competitors
      - analyze-metrics
      - synthesize-feedback
      - synthesize-research
      - score-backlog

  full-stack:
    label: "Full Stack"
    description: "Everything. All 80 skills."
    icon: "layers"
    all: true

